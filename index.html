<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SLUSHY | نظام إدارة الطلبات</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fontsource@latest/cinzel/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fontsource@latest/tajawal/index.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Tajawal:wght@400;500;700&display=swap');
        
        body { font-family: 'Tajawal', sans-serif; background-color: #080808; color: #e5e7eb; overflow-x: hidden; }
        .brand-font { font-family: 'Cinzel', serif; }
        .glass { background: rgba(18, 18, 18, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* شاشة التحميل */
        #loader-screen {
            position: fixed; inset: 0; z-index: 9999; background: #080808;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .loader-bar {
            width: 250px; height: 4px; background: rgba(255,255,255,0.1); 
            border-radius: 10px; margin-top: 30px; overflow: hidden; position: relative;
        }
        .loader-progress {
            position: absolute; top: 0; left: 0; height: 100%; width: 0%;
            background: linear-gradient(90deg, #f97316, #ea580c); 
            transition: width 5s linear; /* انيميشن الشريط يكتمل في 5 ثواني */
        }

        /* Shimmer Effect */
        .img-placeholder { background: rgba(255, 255, 255, 0.03); position: relative; overflow: hidden; }
        .img-placeholder::after {
            content: ""; position: absolute; top: 0; right: 0; bottom: 0; left: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeInUp 0.6s ease-out forwards; }

        .product-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .product-card:hover { transform: translateY(-10px); }
        .btn-orange { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); color: white; }
        .hidden-section { display: none !important; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .input-field { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 15px; border-radius: 15px; width: 100%; outline: none; transition: 0.3s; color: white; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- شاشة التحميل (Loader) -->
    <div id="loader-screen">
        <div class="text-6xl font-black brand-font text-orange-500 animate-pulse">SLUSHY</div>
        <div class="loader-bar"><div id="progress-line" class="loader-progress"></div></div>
        <p class="text-gray-400 mt-6 text-lg tracking-[0.2em] animate-bounce">يتم الآن تجهيز القائمة...</p>
    </div>

    <header class="w-full p-5 flex justify-between items-center glass sticky top-0 z-50">
        <div class="text-3xl font-black brand-font text-orange-500 tracking-tighter">SLUSHY</div>
        <div id="customer-nav" class="hidden-section flex items-center gap-4">
            <button onclick="goHome()" class="bg-white/5 px-4 py-2 rounded-xl text-gray-400 text-sm font-bold border border-white/10 transition hover:text-red-500">خروج</button>
            <button onclick="toggleCart()" class="relative p-2 text-orange-500 bg-orange-500/10 rounded-xl border border-orange-500/20">
                <i class="fas fa-shopping-basket text-2xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-orange-600 text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full hidden">0</span>
            </button>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8">
        <!-- واجهة الاختيار الرئيسية -->
        <section id="role-selection" class="flex flex-col items-center justify-center min-h-[65vh] gap-12">
            <h1 class="text-7xl font-black text-white brand-font animate-fade-up">SLUSHY</h1>
            <div class="flex flex-col w-full max-w-sm gap-5 animate-fade-up" style="animation-delay: 0.2s">
                <button onclick="startLoading()" class="btn-orange py-6 rounded-[2.5rem] text-2xl font-bold shadow-2xl active:scale-95 transition">
                    <i class="fas fa-utensils ml-2"></i> قائمة الطعام
                </button>
                <button onclick="promptAdminLogin()" class="glass py-6 rounded-[2.5rem] text-2xl font-bold border border-white/5 active:scale-95 transition">
                    <i class="fas fa-user-shield ml-2"></i> لوحة الإدارة
                </button>
            </div>
        </section>

        <!-- واجهة الزبون -->
        <section id="customer-view" class="hidden-section">
            <div id="category-tabs" class="flex gap-3 overflow-x-auto pb-6 scrollbar-hide"></div>
            <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </section>

        <!-- لوحة الإدارة (مخفية) -->
        <section id="admin-dashboard" class="hidden-section">
            <div class="flex items-center justify-between mb-10 border-b border-white/5 pb-4">
                <div class="flex gap-6">
                    <button onclick="switchAdminTab('orders')" id="tab-btn-orders" class="text-orange-500 border-b-4 border-orange-500 pb-2 px-2 font-bold">الطلبات</button>
                    <button onclick="switchAdminTab('products')" id="tab-btn-products" class="text-gray-400 pb-2 px-2 font-bold">إدارة المنتجات</button>
                </div>
            </div>
            <div id="admin-orders-tab"><div id="pending-orders-list" class="grid gap-6"></div></div>
            <div id="admin-products-tab" class="hidden-section">
                <div class="glass p-8 rounded-[2.5rem] mb-10">
                    <h4 class="font-bold mb-6 text-orange-500">إضافة منتج جديد</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="new-name" placeholder="اسم المنتج" class="input-field">
                        <input type="number" id="new-price" placeholder="السعر" class="input-field">
                        <select id="new-category-select" class="input-field"></select>
                        <input type="file" id="new-image" onchange="previewImage(this)" class="input-field">
                    </div>
                    <button onclick="addProduct()" class="btn-orange w-full mt-6 py-4 rounded-2xl font-bold">حفظ المنتج</button>
                </div>
                <div id="admin-products-list" class="grid gap-4"></div>
            </div>
        </section>
    </main>

    <!-- السلة -->
    <div id="cart-modal" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-md" onclick="toggleCart()"></div>
        <div class="absolute left-0 top-0 bottom-0 w-full max-w-sm glass p-6 flex flex-col">
            <h2 class="text-3xl font-black mb-6 text-orange-500">سلتك</h2>
            <div id="cart-items" class="flex-grow overflow-y-auto space-y-4"></div>
            <div class="mt-6 space-y-3 pt-6 border-t border-white/10">
                <input type="text" id="order-name" placeholder="الاسم الكامل" class="input-field">
                <input type="tel" id="order-phone" placeholder="رقم الهاتف" class="input-field">
                <input type="text" id="order-car" placeholder="نوع السيارة" class="input-field">
                <textarea id="order-notes" placeholder="ملاحظات" class="input-field h-20"></textarea>
                <button onclick="submitOrder()" class="btn-orange w-full py-5 rounded-2xl font-black">إرسال الطلب</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://slus-n888-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let categories = ["الكل"]; 
        let products = []; 
        let cart = [];
        let selectedCategory = "الكل"; // القيمة الافتراضية هي الكل
        let base64Image = "";

        // جلب الفئات
        db.ref('categories').on('value', s => { 
            let dbCats = s.val() || [];
            categories = ["الكل", ...dbCats.filter(c => c !== "الكل")];
            updateUI(); 
        });

        // جلب المنتجات
        db.ref('products').on('value', s => { 
            const data = s.val() || {};
            products = Object.keys(data).map(k => ({id: k, ...data[k]}));
            updateUI(); 
        });

        // دالة وقت الانتظار 5 ثواني
        function startLoading() {
            const loader = document.getElementById('loader-screen');
            const progress = document.getElementById('progress-line');
            
            // تصفير شريط التحميل وإظهار الشاشة
            progress.style.width = '0%';
            loader.style.display = 'flex';
            
            // بدء حركة الشريط
            setTimeout(() => {
                progress.style.width = '100%';
            }, 50);

            // الانتظار 5 ثواني قبل الدخول
            setTimeout(() => {
                loader.style.display = 'none'; 
                
                // الانتقال لواجهة الزبون
                document.getElementById('role-selection').classList.add('hidden-section');
                document.getElementById('customer-view').classList.remove('hidden-section');
                document.getElementById('customer-nav').classList.remove('hidden-section');
                
                // تأكيد اختيار "الكل" عند الدخول
                selectedCategory = "الكل";
                updateUI();
            }, 5000); 
        }

        function updateUI() {
            // تحديث التبويبات
            const tabs = document.getElementById('category-tabs');
            if(tabs) {
                tabs.innerHTML = categories.map(c => `
                    <button onclick="selectedCategory='${c}'; updateUI();" 
                        class="px-10 py-4 rounded-full whitespace-nowrap font-bold transition-all 
                        ${selectedCategory === c ? 'btn-orange scale-105' : 'glass text-gray-500'}">
                        ${c}
                    </button>
                `).join('');
            }

            // تصفية المنتجات بناءً على الاختيار
            const filtered = selectedCategory === "الكل" ? products : products.filter(p => p.category === selectedCategory);

            const grid = document.getElementById('products-grid');
            if(grid) {
                grid.innerHTML = filtered.map((p, index) => `
                    <div class="product-card glass rounded-[3rem] overflow-hidden relative animate-fade-up" style="animation-delay: ${index * 0.05}s">
                        <div class="h-60 w-full img-placeholder relative">
                            <img src="${p.image}" loading="lazy" class="w-full h-full object-cover opacity-0 transition-opacity duration-700" onload="this.classList.remove('opacity-0'); this.parentElement.classList.remove('img-placeholder')">
                        </div>
                        <div class="p-8">
                            <h4 class="font-bold text-2xl text-white mb-3">${p.name}</h4>
                            <div class="flex justify-between items-center">
                                <span class="text-orange-500 font-black text-2xl">${p.price.toLocaleString()} <small>د.ع</small></span>
                                <button onclick="addToCart('${p.id}')" class="btn-orange p-5 rounded-2xl active:scale-90 transition"><i class="fas fa-cart-plus text-xl"></i></button>
                            </div>
                        </div>
                    </div>`).join('');
            }

            // لوحة الإدارة - قائمة المنتجات
            const adminList = document.getElementById('admin-products-list');
            if(adminList) {
                adminList.innerHTML = products.map(p => `
                    <div class="glass p-4 rounded-2xl flex items-center justify-between">
                        <div class="flex items-center gap-4"><img src="${p.image}" class="w-12 h-12 rounded-lg object-cover"><span>${p.name}</span></div>
                        <button onclick="if(confirm('هل أنت متأكد من حذف المنتج؟')) db.ref('products/${p.id}').remove()" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>
                    </div>`).join('');
            }

            // تحديث قائمة الاختيار للفئات في لوحة الإدارة
            const select = document.getElementById('new-category-select');
            if(select) {
                const availableCats = categories.filter(c => c !== "الكل");
                select.innerHTML = availableCats.map(c => `<option value="${c}">${c}</option>`).join('') + (availableCats.length === 0 ? `<option value="عام">عام</option>` : "");
            }
        }

        function addToCart(pid) {
            const p = products.find(x => x.id === pid);
            const exist = cart.find(x => x.id === pid);
            if(exist) exist.qty++; else cart.push({...p, qty: 1});
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-items').innerHTML = cart.map(i => `
                <div class="flex justify-between items-center glass p-4 rounded-xl">
                    <span class="font-bold">${i.name}</span>
                    <div class="flex items-center gap-3">
                        <button onclick="changeQty('${i.id}', -1)" class="w-8 h-8 bg-white/5 rounded-full">-</button>
                        <span class="text-orange-500 font-bold">${i.qty}</span>
                        <button onclick="changeQty('${i.id}', 1)" class="w-8 h-8 bg-orange-500 rounded-full">+</button>
                    </div>
                </div>`).join('');
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-count').classList.toggle('hidden', cart.length === 0);
        }

        function changeQty(id, d) {
            const i = cart.find(x => x.id === id);
            i.qty += d;
            if(i.qty <= 0) cart = cart.filter(x => x.id !== id);
            updateCartUI();
        }

        function goHome() { location.reload(); }
        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }
        
        function previewImage(i) {
            const r = new FileReader();
            r.onload = e => base64Image = e.target.result;
            r.readAsDataURL(i.files[0]);
        }

        function promptAdminLogin() {
            const p = prompt("رمز الدخول:");
            if(p === "1221") {
                document.getElementById('role-selection').classList.add('hidden-section');
                document.getElementById('admin-dashboard').classList.remove('hidden-section');
            }
        }

        function switchAdminTab(t) {
            document.getElementById('admin-orders-tab').classList.toggle('hidden-section', t !== 'orders');
            document.getElementById('admin-products-tab').classList.toggle('hidden-section', t !== 'products');
            document.getElementById('tab-btn-orders').classList.toggle('text-orange-500', t === 'orders');
            document.getElementById('tab-btn-orders').classList.toggle('border-orange-500', t === 'orders');
            document.getElementById('tab-btn-products').classList.toggle('text-orange-500', t === 'products');
            document.getElementById('tab-btn-products').classList.toggle('border-orange-500', t === 'products');
        }

        function addProduct() {
            const n = document.getElementById('new-name').value;
            const p = parseInt(document.getElementById('new-price').value);
            const c = document.getElementById('new-category-select').value;
            if(n && p && base64Image) {
                db.ref('products/' + Date.now()).set({ name: n, price: p, category: c, image: base64Image, available: true });
                alert("تمت إضافة المنتج بنجاح");
                document.getElementById('new-name').value = ""; 
                document.getElementById('new-price').value = "";
                document.getElementById('new-image').value = "";
                base64Image = "";
            } else {
                alert("يرجى ملء جميع الحقول واختيار صورة");
            }
        }

        function submitOrder() { 
            if(cart.length === 0) return alert("السلة فارغة!");
            alert("تم إرسال طلبك بنجاح!"); 
            cart = []; 
            updateCartUI(); 
            toggleCart(); 
        }
    </script>
</body>
</html>
