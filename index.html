<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SLUSHY | نظام إدارة الطلبات</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fontsource@latest/cinzel/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fontsource@latest/tajawal/index.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Tajawal:wght@400;500;700&display=swap');
        
        body { font-family: 'Tajawal', sans-serif; background-color: #080808; color: #e5e7eb; overflow-x: hidden; }
        .brand-font { font-family: 'Cinzel', serif; }
        .glass { background: rgba(18, 18, 18, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        #loader-screen {
            position: fixed; inset: 0; z-index: 9999; background: #080808;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .loader-bar {
            width: 250px; height: 4px; background: rgba(255,255,255,0.1); 
            border-radius: 10px; margin-top: 30px; overflow: hidden; position: relative;
        }
        .loader-progress {
            position: absolute; top: 0; left: 0; height: 100%; width: 0%;
            background: linear-gradient(90deg, #f97316, #ea580c); 
            transition: width 5s linear; 
        }

        .animate-fade-up { animation: fadeInUp 0.6s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .product-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .product-card:hover { transform: translateY(-10px); }
        .btn-orange { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); color: white; }
        .hidden-section { display: none !important; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .input-field { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 15px; border-radius: 15px; width: 100%; outline: none; transition: 0.3s; color: white; }
        
        .toggle-btn { transition: 0.3s; padding: 5px 15px; border-radius: 50px; font-size: 12px; font-weight: bold; }
        .toggle-on { background: #22c55e; color: white; }
        .toggle-off { background: #ef4444; color: white; }

        .status-badge { padding: 4px 12px; border-radius: 50px; font-size: 11px; font-weight: bold; }
        .status-pending { background: #f59e0b; color: #000; }
        .status-completed { background: #10b981; color: #fff; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- شاشة التحميل -->
    <div id="loader-screen">
        <div class="text-6xl font-black brand-font text-orange-500 animate-pulse">SLUSHY</div>
        <div class="loader-bar"><div id="progress-line" class="loader-progress"></div></div>
        <p class="text-gray-400 mt-6 text-lg tracking-[0.2em] animate-bounce">يتم الآن تجهيز القائمة...</p>
    </div>

    <!-- الهيدر -->
    <header class="w-full p-5 flex justify-between items-center glass sticky top-0 z-50">
        <div class="text-3xl font-black brand-font text-orange-500 tracking-tighter">SLUSHY</div>
        <div id="main-nav" class="hidden-section flex items-center gap-4">
            <button onclick="goHome()" class="bg-white/5 px-4 py-2 rounded-xl text-gray-400 text-sm font-bold border border-white/10 transition hover:text-red-500">خروج</button>
            <div id="cart-btn-container" class="hidden-section">
                <button onclick="toggleCart()" class="relative p-2 text-orange-500 bg-orange-500/10 rounded-xl border border-orange-500/20">
                    <i class="fas fa-shopping-basket text-2xl"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-orange-600 text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full hidden">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8">
        <!-- الواجهة الرئيسية -->
        <section id="role-selection" class="flex flex-col items-center justify-center min-h-[65vh] gap-12">
            <h1 class="text-7xl font-black text-white brand-font animate-fade-up">SLUSHY</h1>
            <div class="flex flex-col w-full max-w-sm gap-5 animate-fade-up" style="animation-delay: 0.2s">
                <button onclick="startLoading()" class="btn-orange py-6 rounded-[2.5rem] text-2xl font-bold shadow-2xl active:scale-95 transition">
                    <i class="fas fa-utensils ml-2"></i> قائمة الطعام
                </button>
                <button onclick="promptAdminLogin()" class="glass py-6 rounded-[2.5rem] text-2xl font-bold border border-white/5 active:scale-95 transition">
                    <i class="fas fa-user-shield ml-2"></i> لوحة الإدارة
                </button>
            </div>
        </section>

        <!-- واجهة الزبون -->
        <section id="customer-view" class="hidden-section">
            <div id="category-tabs" class="flex gap-3 overflow-x-auto pb-6 scrollbar-hide"></div>
            <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </section>

        <!-- لوحة الإدارة -->
        <section id="admin-dashboard" class="hidden-section">
            <div class="flex items-center gap-4 mb-10 border-b border-white/5 pb-4 overflow-x-auto">
                <button onclick="switchAdminTab('orders')" id="tab-btn-orders" class="text-orange-500 border-b-4 border-orange-500 pb-2 px-4 font-bold whitespace-nowrap">الطلبات</button>
                <button onclick="switchAdminTab('products')" id="tab-btn-products" class="text-gray-400 pb-2 px-4 font-bold whitespace-nowrap">المنتجات</button>
                <button onclick="switchAdminTab('reports')" id="tab-btn-reports" class="text-gray-400 pb-2 px-4 font-bold whitespace-nowrap">التقارير اليومية</button>
            </div>

            <div id="admin-orders-tab" class="space-y-4">
                <div id="pending-orders-list" class="grid gap-6"></div>
            </div>

            <div id="admin-products-tab" class="hidden-section">
                <div class="glass p-8 rounded-[2.5rem] mb-10">
                    <h4 class="font-bold mb-6 text-orange-500 text-center">إضافة منتج جديد</h4>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="new-name" placeholder="اسم المنتج" class="input-field">
                        <input type="number" id="new-price" placeholder="السعر" class="input-field">
                        <select id="new-category-select" class="input-field"></select>
                        <input type="file" onchange="previewImage(this)" class="input-field">
                    </div>
                    <button onclick="addProduct()" class="btn-orange w-full mt-6 py-4 rounded-2xl font-bold">حفظ المنتج</button>
                </div>
                <div id="admin-products-list" class="grid gap-4"></div>
            </div>

            <div id="admin-reports-tab" class="hidden-section">
                <div class="grid gap-4" id="daily-summary-list"></div>
            </div>
        </section>
    </main>

    <!-- سلة التسوق -->
    <div id="cart-modal" class="fixed inset-0 z-[60] hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-md" onclick="toggleCart()"></div>
        <div class="absolute left-0 top-0 bottom-0 w-full max-sm:w-full max-w-sm glass p-6 flex flex-col">
            <h2 class="text-3xl font-black mb-6 text-orange-500">سلتك</h2>
            <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 scrollbar-hide"></div>
            <div class="mt-6 space-y-3 pt-6 border-t border-white/10">
                <input type="text" id="order-name" placeholder="الاسم الكامل" class="input-field">
                <input type="tel" id="order-phone" placeholder="رقم الهاتف" class="input-field">
                <input type="text" id="order-car" placeholder="نوع السيارة" class="input-field">
                <textarea id="order-notes" placeholder="ملاحظات إضافية" class="input-field h-20"></textarea>
                <button onclick="submitOrder()" class="btn-orange w-full py-5 rounded-2xl font-black text-lg">إرسال الطلب</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://slus-n888-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let categories = ["الكل"]; 
        let products = []; 
        let cart = [];
        let selectedCategory = "الكل";
        let base64Image = "";

        // جلب الفئات والمنتجات
        db.ref('categories').on('value', s => { 
            let dbCats = s.val() || [];
            categories = ["الكل", ...dbCats.filter(c => c !== "الكل")];
            updateUI(); 
        });

        db.ref('products').on('value', s => { 
            const data = s.val() || {};
            products = Object.keys(data).map(k => ({id: k, ...data[k]}));
            updateUI(); 
        });

        // جلب الطلبات بشكل حي (للمسؤول)
        db.ref('orders').on('value', s => {
            const data = s.val() || {};
            const ordersArray = Object.keys(data).map(k => ({id: k, ...data[k]})).reverse();
            renderOrders(ordersArray);
            renderDailyReports(ordersArray);
        });

        function renderOrders(orders) {
            const list = document.getElementById('pending-orders-list');
            if(!list) return;
            if(orders.length === 0) {
                list.innerHTML = '<div class="text-center py-10 text-gray-500">لا يوجد طلبات حالياً</div>';
                return;
            }

            list.innerHTML = orders.map(o => {
                const date = new Date(o.time);
                const timeStr = date.getHours() + ":" + (date.getMinutes()<10?'0':'') + date.getMinutes();
                const dateStr = date.toLocaleDateString('ar-IQ');
                const isCompleted = o.status === 'completed';
                
                return `
                <div class="glass p-6 rounded-3xl border-r-4 ${isCompleted ? 'border-green-500 opacity-80' : 'border-amber-500'} animate-fade-up">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <div class="flex items-center gap-3">
                                <h4 class="font-black text-xl text-white">${o.customerName}</h4>
                                <span class="status-badge ${isCompleted ? 'status-completed' : 'status-pending'}">
                                    ${isCompleted ? 'مكتمل' : 'قيد الانتظار'}
                                </span>
                            </div>
                            <p class="text-xs text-gray-400 mt-1">${o.carType} | ${dateStr} - ${timeStr}</p>
                            <p class="text-sm font-bold text-orange-500">${o.phone}</p>
                        </div>
                        <div class="flex gap-2">
                            ${!isCompleted ? `<button onclick="completeOrder('${o.id}')" class="bg-green-600 text-white px-4 py-2 rounded-xl text-xs font-bold">تم التجهيز</button>` : ''}
                            <button onclick="deleteOrder('${o.id}')" class="bg-red-500/20 text-red-500 p-2 rounded-xl"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="bg-black/30 rounded-2xl p-4 space-y-2">
                        ${o.items.map(i => `
                            <div class="flex justify-between text-sm">
                                <span>${i.name} <b class="text-orange-500">x${i.qty}</b></span>
                                <span class="font-bold">${(i.price * i.qty).toLocaleString()} د.ع</span>
                            </div>
                        `).join('')}
                        <div class="border-t border-white/10 pt-2 mt-2 flex justify-between font-black text-orange-500 text-lg">
                            <span>الإجمالي:</span>
                            <span>${Number(o.totalAmount).toLocaleString()} د.ع</span>
                        </div>
                    </div>
                    ${o.notes ? `<p class="text-xs text-gray-400 mt-3 italic bg-white/5 p-2 rounded-lg">ملاحظات: ${o.notes}</p>` : ''}
                </div>`;
            }).join('');
        }

        function renderDailyReports(orders) {
            const reportList = document.getElementById('daily-summary-list');
            if(!reportList) return;

            const dailyData = {};
            orders.filter(o => o.status === 'completed').forEach(o => {
                const dateKey = new Date(o.time).toLocaleDateString('ar-IQ');
                dailyData[dateKey] = (dailyData[dateKey] || 0) + Number(o.totalAmount);
            });

            const sortedDays = Object.keys(dailyData);

            reportList.innerHTML = sortedDays.map(day => `
                <div class="glass p-5 rounded-2xl flex justify-between items-center border-l-4 border-green-500">
                    <div>
                        <p class="text-gray-400 text-xs">إجمالي مبيعات يوم</p>
                        <h4 class="font-bold text-lg">${day}</h4>
                    </div>
                    <p class="text-green-500 font-black text-xl">${dailyData[day].toLocaleString()} <small>د.ع</small></p>
                </div>
            `).join('') || '<p class="text-center text-gray-500 py-10">لا توجد مبيعات مكتملة لهذا اليوم</p>';
        }

        function startLoading() {
            const loader = document.getElementById('loader-screen');
            const progress = document.getElementById('progress-line');
            loader.style.display = 'flex';
            progress.style.width = '0%';
            setTimeout(() => { progress.style.width = '100%'; }, 50);
            setTimeout(() => {
                loader.style.display = 'none'; 
                document.getElementById('role-selection').classList.add('hidden-section');
                document.getElementById('customer-view').classList.remove('hidden-section');
                document.getElementById('main-nav').classList.remove('hidden-section');
                document.getElementById('cart-btn-container').classList.remove('hidden-section');
                selectedCategory = "الكل";
                updateUI();
            }, 5000); 
        }

        function updateUI() {
            const tabs = document.getElementById('category-tabs');
            if(tabs) tabs.innerHTML = categories.map(c => `
                <button onclick="selectedCategory='${c}'; updateUI();" class="px-10 py-4 rounded-full whitespace-nowrap font-bold transition-all ${selectedCategory === c ? 'btn-orange scale-105' : 'glass text-gray-500'}">${c}</button>
            `).join('');

            const filtered = selectedCategory === "الكل" ? products : products.filter(p => p.category === selectedCategory);
            const grid = document.getElementById('products-grid');
            if(grid) grid.innerHTML = filtered.map((p, index) => {
                const isAvail = p.available !== false;
                return `
                <div class="product-card glass rounded-[3rem] overflow-hidden relative animate-fade-up ${!isAvail ? 'opacity-60' : ''}" style="animation-delay: ${index * 0.05}s">
                    ${!isAvail ? '<div class="absolute inset-0 bg-black/70 flex items-center justify-center z-10 text-center"><span class="bg-red-600 text-white px-4 py-2 rounded-full font-bold text-xs">المنتج غير متوفر حالياً</span></div>' : ''}
                    <div class="h-60 w-full relative"><img src="${p.image}" class="w-full h-full object-cover"></div>
                    <div class="p-8">
                        <h4 class="font-bold text-2xl text-white mb-3">${p.name}</h4>
                        <div class="flex justify-between items-center">
                            <span class="text-orange-500 font-black text-2xl">${Number(p.price).toLocaleString()} <small>د.ع</small></span>
                            <button onclick="${isAvail ? `addToCart('${p.id}')` : ''}" class="${isAvail ? 'btn-orange' : 'bg-gray-700'} p-5 rounded-2xl transition"><i class="fas fa-cart-plus"></i></button>
                        </div>
                    </div>
                </div>`;
            }).join('');

            const adminList = document.getElementById('admin-products-list');
            if(adminList) adminList.innerHTML = products.map(p => `
                <div class="glass p-4 rounded-2xl flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <img src="${p.image}" class="w-12 h-12 rounded-lg object-cover">
                        <div><p class="font-bold text-sm">${p.name}</p><p class="text-xs text-orange-500">${Number(p.price).toLocaleString()} د.ع</p></div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="toggleAvail('${p.id}', ${p.available !== false})" class="toggle-btn ${p.available !== false ? 'toggle-on' : 'toggle-off'}">${p.available !== false ? 'متوفر' : 'غير متوفر'}</button>
                        <button onclick="if(confirm('حذف المنتج؟')) db.ref('products/${p.id}').remove()" class="text-red-500 p-2"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`).join('');

            const select = document.getElementById('new-category-select');
            if(select) select.innerHTML = categories.filter(c => c !== "الكل").map(c => `<option value="${c}">${c}</option>`).join('') + `<option value="عام">عام</option>`;
        }

        function addToCart(pid) {
            const p = products.find(x => x.id === pid);
            const exist = cart.find(x => x.id === pid);
            if(exist) exist.qty++; else cart.push({...p, qty: 1});
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-items').innerHTML = cart.map(i => `
                <div class="flex justify-between items-center glass p-4 rounded-xl">
                    <span class="font-bold text-sm">${i.name}</span>
                    <div class="flex items-center gap-3">
                        <button onclick="changeQty('${i.id}', -1)" class="w-8 h-8 bg-white/5 rounded-full">-</button>
                        <span class="text-orange-500 font-bold">${i.qty}</span>
                        <button onclick="changeQty('${i.id}', 1)" class="w-8 h-8 bg-orange-500 rounded-full">+</button>
                    </div>
                </div>`).join('');
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-count').classList.toggle('hidden', cart.length === 0);
        }

        function changeQty(id, d) {
            const i = cart.find(x => x.id === id);
            i.qty += d;
            if(i.qty <= 0) cart = cart.filter(x => x.id !== id);
            updateCartUI();
        }

        function submitOrder() {
            const name = document.getElementById('order-name').value;
            const phone = document.getElementById('order-phone').value;
            const car = document.getElementById('order-car').value;
            const notes = document.getElementById('order-notes').value;

            if(!name || !phone || cart.length === 0) return alert("يرجى إكمال الاسم ورقم الهاتف واختيار المنتجات");

            const totalAmount = cart.reduce((sum, i) => sum + (Number(i.price) * i.qty), 0);

            const orderData = {
                customerName: name, phone, carType: car, notes,
                items: cart.map(i => ({ name: i.name, qty: i.qty, price: i.price })),
                totalAmount,
                status: 'pending',
                time: Date.now()
            };

            db.ref('orders').push(orderData).then(() => {
                alert("تم إرسال طلبك! سيتم تجهيزه فوراً.");
                cart = []; updateCartUI(); toggleCart();
                ['order-name','order-phone','order-car','order-notes'].forEach(id => document.getElementById(id).value = "");
            }).catch(e => alert("حدث خطأ في الإرسال"));
        }

        function completeOrder(id) { db.ref('orders/' + id).update({ status: 'completed' }); }
        function deleteOrder(id) { if(confirm("هل تريد حذف الطلب نهائياً؟")) db.ref('orders/' + id).remove(); }
        function toggleAvail(id, current) { db.ref('products/' + id).update({ available: !current }); }
        
        function promptAdminLogin() {
            const p = prompt("رمز الدخول:");
            if(p === "1221") {
                document.getElementById('role-selection').classList.add('hidden-section');
                document.getElementById('admin-dashboard').classList.remove('hidden-section');
                document.getElementById('main-nav').classList.remove('hidden-section');
                document.getElementById('cart-btn-container').classList.add('hidden-section');
            } else { alert("الرمز خاطئ!"); }
        }

        function switchAdminTab(t) {
            ['orders','products','reports'].forEach(tab => {
                document.getElementById(`admin-${tab}-tab`).classList.toggle('hidden-section', tab !== t);
                document.getElementById(`tab-btn-${tab}`).className = (tab === t) ? 
                    "text-orange-500 border-b-4 border-orange-500 pb-2 px-4 font-bold whitespace-nowrap" : 
                    "text-gray-400 pb-2 px-4 font-bold whitespace-nowrap";
            });
        }

        function previewImage(i) {
            const r = new FileReader();
            r.onload = e => base64Image = e.target.result;
            r.readAsDataURL(i.files[0]);
        }

        function addProduct() {
            const n = document.getElementById('new-name').value, p = document.getElementById('new-price').value, c = document.getElementById('new-category-select').value;
            if(n && p && base64Image) {
                db.ref('products/' + Date.now()).set({ name: n, price: Number(p), category: c, image: base64Image, available: true });
                alert("تم إضافة المنتج");
                document.getElementById('new-name').value = ""; document.getElementById('new-price').value = "";
            } else { alert("يرجى ملء كافة الحقول واختيار صورة"); }
        }

        function goHome() { location.reload(); }
        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }
    </script>
</body>
</html>
